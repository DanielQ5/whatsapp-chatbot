spring.application.name=whatsapp-chatbot

# Server Configuration
server.port=8080

# Production Database (READ ONLY - Policies)
spring.datasource.production.jdbc-url=jdbc:postgresql://localhost:5432/insurance_production
spring.datasource.production.username=postgres
spring.datasource.production.password=${PROD_DB_PASSWORD}
spring.datasource.production.driver-class-name=org.postgresql.Driver

# Bot Database (READ/WRITE - Analytics)
spring.datasource.chatanalytics.jdbc-url=jdbc:postgresql://localhost:5432/insurance_chatanalytics
spring.datasource.chatanalytics.username=postgres
spring.datasource.chatanalytics.password=${ANALYTICS_DB_PASSWORD}
spring.datasource.chatanalytics.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.chatbot=DEBUG

weather.api.key=${WEATHER_API_KEY}
